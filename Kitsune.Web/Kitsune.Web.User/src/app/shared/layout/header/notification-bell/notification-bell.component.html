<!-- frontend/Kitsune.Web.User/src/app/shared/layout/header/notification-bell/notification-bell.component.html -->
<div class="notif-bell" [class.notif-bell--open]="isOpen()">
  <button class="notif-bell__btn" (click)="toggle()" title="Thông báo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    @if (unreadCount() > 0) {
      <span class="notif-bell__badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
    }
  </button>

  @if (isOpen()) {
    <div class="notif-dropdown" (click)="$event.stopPropagation()">
      <div class="notif-dropdown__header">
        <h3>Thông báo</h3>
        @if (unreadCount() > 0) {
          <button class="notif-dropdown__mark-all" (click)="markAllAsRead()">Đọc tất cả</button>
        }
      </div>

      @if (isLoading()) {
        <div class="notif-dropdown__empty"><app-loading-fox message="Đang tải thông báo..." [size]="56" /></div>
      } @else if (notifications().length === 0) {
        <div class="notif-dropdown__empty">
          <span class="notif-dropdown__empty-icon">🔔</span>
          <p>Chưa có thông báo nào</p>
        </div>
      } @else {
        <div class="notif-list">
          @for (notif of notifications(); track notif.id) {
            <button
              class="notif-item"
              [class.notif-item--unread]="!notif.isRead"
              (click)="markAsRead(notif); goToRelated(notif)"
            >
              <span class="notif-item__icon">{{ getIcon(notif.type) }}</span>
              <div class="notif-item__body">
                <p class="notif-item__title">{{ notif.title }}</p>
                <p class="notif-item__msg">{{ notif.message }}</p>
                <span class="notif-item__time">{{ formatTime(notif.createdAt) }}</span>
              </div>
              @if (!notif.isRead) {
                <span class="notif-item__dot"></span>
              }
            </button>
          }
        </div>
      }
    </div>
  }
</div>
