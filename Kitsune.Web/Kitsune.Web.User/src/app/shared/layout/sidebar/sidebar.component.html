<div class="sidebar-overlay" [class.open]="collapsed() === false" (click)="navClick.emit()"></div>

<aside class="sidebar" [class.open]="collapsed() === false">
  <div class="sidebar-brand">
    <img class="sidebar-logo-img" src="/Logo.png" alt="Kitsune" />
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.id) {
    <a class="nav-link" [class.nav-link--active]="isActive(item, currentUrl())" [routerLink]="item.route"
      (click)="navClick.emit()">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" [innerHTML]="svgIcon(item.icon)"></svg>
      {{ item.label }}
    </a>
    }
  </nav>

  <div class="sidebar-footer">
    <!-- Streak widget thay Daily Goal -->
    <div class="streak-widget">
      <div class="streak-header">
        <span class="streak-emoji">🔥</span>
        <span class="streak-title">Chuỗi học tập</span>
      </div>
      <div class="streak-body">
        <span class="streak-count">{{ streak() }}</span>
        <span class="streak-unit">ngày liên tiếp</span>
      </div>
      <div class="streak-xp-row">
        <span class="xp-label">Tổng XP</span>
        <span class="xp-value">{{ totalXP() | number }}</span>
      </div>
    </div>

  </div>
</aside>
