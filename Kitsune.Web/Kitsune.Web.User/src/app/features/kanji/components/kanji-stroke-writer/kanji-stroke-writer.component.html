<div class="stroke-card">
  <div class="stroke-card__header">
    <div class="stroke-card__copy">
      <div class="stroke-card__eyebrow">Thứ tự nét</div>
      <p class="stroke-card__hint">Từng nét được vẽ chậm để dễ quan sát.</p>
    </div>

    <button
      type="button"
      class="stroke-card__replay"
      (click)="replayAnimation()"
      [disabled]="isLoading() || !isReady() || !!errorMessage()"
      aria-label="Phát lại nét viết"
      title="Phát lại nét viết"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-2.64-6.36" />
        <path d="M21 3v6h-6" />
      </svg>
    </button>
  </div>

  <div class="stroke-stage" [class.stroke-stage--error]="!!errorMessage()">
    <div
      #writerHost
      class="stroke-stage__writer"
      [style.width.px]="width"
      [style.height.px]="height"
      [class.stroke-stage__writer--hidden]="isLoading() || !!errorMessage()"
    ></div>

    @if (isLoading()) {
      <div class="stroke-stage__status">
        <app-loading-fox message="Đang dựng nét viết..." [size]="64" />
      </div>
    }

    @if (errorMessage(); as message) {
      <div class="stroke-stage__status stroke-stage__status--error">
        <div class="stroke-stage__error-icon">漢</div>
        <p>{{ message }}</p>
        <button type="button" class="stroke-stage__retry" (click)="retry()">Thử lại</button>
      </div>
    }
  </div>
</div>
