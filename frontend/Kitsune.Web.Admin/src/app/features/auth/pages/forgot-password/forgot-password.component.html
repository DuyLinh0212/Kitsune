<div class="auth-page">
  <div class="auth-card">
    <h1>Quên mật khẩu</h1>
    <p>Nhập email admin để tạo OTP đặt lại mật khẩu.</p>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()">
      <label><span>Email</span><input formControlName="email" type="email" /></label>

      @if (errorMessage()) { <p class="message error">{{ errorMessage() }}</p> }
      @if (successMessage()) { <p class="message success">{{ successMessage() }}</p> }

      <button type="submit" [disabled]="isSubmitting()">{{ isSubmitting() ? 'Đang gửi...' : 'Gửi yêu cầu' }}</button>
    </form>

    <a routerLink="/login">Quay lại đăng nhập</a>
  </div>
</div>
