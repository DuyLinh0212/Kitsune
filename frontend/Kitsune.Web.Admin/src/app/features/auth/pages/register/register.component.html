<div class="auth-page">
  <div class="auth-card">
    <h1>Tạo tài khoản Admin</h1>
    <p>Chỉ dùng cho người quản trị hệ thống.</p>

    <form [formGroup]="registerForm" (ngSubmit)="submit()">
      <label><span>Họ và tên</span><input formControlName="fullName" type="text" /></label>
      <label><span>Email</span><input formControlName="email" type="email" /></label>
      <label><span>Username</span><input formControlName="username" type="text" /></label>
      <label><span>Password</span><input formControlName="password" type="password" /></label>
      <label><span>Xác nhận</span><input formControlName="confirmPassword" type="password" /></label>

      @if (errorMessage()) { <p class="message error">{{ errorMessage() }}</p> }
      @if (successMessage()) { <p class="message success">{{ successMessage() }}</p> }

      <button type="submit" [disabled]="isSubmitting()">{{ isSubmitting() ? 'Đang tạo...' : 'Tạo admin' }}</button>
    </form>

    <a routerLink="/login">Quay lại đăng nhập</a>
  </div>
</div>
