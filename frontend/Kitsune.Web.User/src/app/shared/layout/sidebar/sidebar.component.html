<div class="sidebar-overlay" [class.open]="collapsed() === false" (click)="navClick.emit()"></div>

<aside class="sidebar" [class.open]="collapsed() === false">
  <div class="sidebar-brand">
    <span class="brand-icon">🦊</span>
    <span class="brand-name">Kitsune</span>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-link"
        [class.nav-link--active]="isActive(item, currentUrl())"
        (click)="navigateTo(item.route)"
      >
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [innerHTML]="svgIcon(item.icon)"></svg>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <div class="daily-goal-box">
      <div class="daily-goal-header">Daily Goal</div>
      <div class="daily-goal-circle">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#f3f4f6" stroke-width="6"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round"
            [attr.stroke-dasharray]="dailyGoalPercent + ' 100'" transform="rotate(-90 40 40)"/>
          <text x="40" y="38" text-anchor="middle" fill="#1f2937" font-size="14" font-weight="700">
            {{ dailyGoal().current }} / {{ dailyGoal().target }}
          </text>
          <text x="40" y="50" text-anchor="middle" fill="#6b7280" font-size="10">XP</text>
        </svg>
      </div>
      <span class="goal-label">Keep it up! 🔥</span>
      <button class="view-progress-btn">View Progress</button>
    </div>
    <div class="sidebar-bottom-actions">
      <button class="icon-btn">⚙️</button>
      <button class="icon-btn">🌙</button>
    </div>
  </div>
</aside>
