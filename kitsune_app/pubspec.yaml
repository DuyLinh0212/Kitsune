name: kitsune_app
description: "Kitsune - Nền tảng học tiếng Nhật. Learn Smarter, Not Harder."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.2

  # JSON serialization

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  xml: ^6.5.0
  path_drawing: ^1.0.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.2
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/LogoApp.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
